name: ci

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux-nix:
      name: linux (nix)
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Install Nix
          uses: cachix/install-nix-action@v25
          with:
            nix_path: nixpkgs=channel:nixos-unstable

        - name: Build with Xmake inside Nix
          run: |
            nix-shell --run "xmake f -y -m debug && xmake build -y tests main"

  windows:
    name: windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Build tests and main
        shell: pwsh
        run: |
          xmake global --clean
          xmake f -y -p windows -a x64 -m debug
          xmake build -y tests
          xmake build -y main
